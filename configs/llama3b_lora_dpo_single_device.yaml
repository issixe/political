# Config for single device LoRA finetuning in lora_finetune_single_device.py
# using a Llama3 3B model
#
# This config works only for training on single device.

# Model Arguments
model:
  _component_: torchtune.models.llama3_2.lora_llama3_2_3b
  lora_attn_modules: ['q_proj', 'v_proj']
  lora_rank: 16
  lora_alpha: 32
  apply_lora_to_mlp: True
  apply_lora_to_output: False

# Tokenizer
tokenizer:
  _component_: torchtune.models.llama3.llama3_tokenizer
  path: checkpoints/Llama-3.2-3B/original/tokenizer.model

checkpointer:
  _component_: torchtune.training.FullModelMetaCheckpointer
  checkpoint_dir: checkpoints/Llama-3.2-3B/original/
  checkpoint_files: [
    consolidated.00.pth
  ]
  recipe_checkpoint: null
  output_dir: outputs/Llama-3.2-3B/dpo
  model_type: LLAMA3_2
resume_from_checkpoint: False

# Dataset and Sampler
dataset:
  _component_: torchtune.datasets.stack_exchange_paired_dataset
seed: null
shuffle: True

# Optimizer and Scheduler
optimizer:
  _component_: torch.optim.AdamW
  weight_decay: 0.05
  lr: 5e-4
lr_scheduler:
  _component_: torchtune.training.get_cosine_schedule_with_warmup
  num_warmup_steps: 100

loss:
  _component_: torchtune.rlhf.loss.DPOLoss
  beta: 0.1
  label_smoothing: 0

# Training
epochs: 4
max_steps_per_epoch: null
gradient_accumulation_steps: 64
compile: False
eval_freq: 64
batch_size: 1

# Logging
output_dir: outputs/Llama-3.2-3B/dpo_logs/
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${output_dir}
log_every_n_steps: 1

# Environment
device: cuda
dtype: bf16
enable_activation_checkpointing: False
